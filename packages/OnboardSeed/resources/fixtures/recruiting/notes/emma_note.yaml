title: Emma Thompson leadership experience
noteable_type: people
noteable_key: emma
custom_fields:
  body: <p>Emma has managed engineering teams of up to 25 people across two previous roles. She led the migration from monolith to microservices at her last company and grew the platform team from 4 to 12 engineers in 18 months. Her management style emphasizes autonomy and clear technical direction. Strong references expected from both direct reports and peers.</p>
